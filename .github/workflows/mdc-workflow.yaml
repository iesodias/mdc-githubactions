name: 'terraform-deploy'

env:
  ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

on: 
  push:
    branches: [ "none" ]
  workflow_dispatch:
    inputs:
      name:
        description: 'StorageAccount Name'
        required: true
        default: ''
      destroyTerraform:
        description: 'Destroy Terraform'
        required: true
        default: false
        type: boolean 

jobs:
  TerraformApply:
    name: 'TerraformApply'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - uses: azure/login@v1
      with:
        creds: ${{secrets.AZURE_CREDENTIALS}}
        enable-AzPSSession: true 
    - uses: cschleiden/replace-tokens@v1
      with:
        tokenPrefix: '#{'
        tokenSuffix: '}#'
        files: '["**/*.tfvars"]'
    - name: Terraform Init
      run: |
        cd manifest/
        terraform init
    - name: Terraform Validate
      run: |
        cd manifest/
        terraform validate -no-color
    - name: Terraform Plan
      run: |
        cd manifest/
        terraform plan -var-file=var.tfvars -no-color -input=false
    - name: Terraform Apply
      run: |
        cd manifest/
        terraform apply -var-file=var.tfvars -auto-approve -no-color -input=false
